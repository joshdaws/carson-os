name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to the Household page
        2. Click "Add Staff"
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details
      placeholder: |
        OS: macOS 15.3
        Node: v22.18.0
        Browser: Chrome 130
        CarsonOS version: 0.1.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Server logs or error messages
      description: Paste any relevant terminal output or browser console errors
      render: shell
    validations:
      required: false
